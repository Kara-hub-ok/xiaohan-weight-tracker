<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小涵的减重记录 🌿</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #e0f2e9 0%, #f0e6f6 30%, #e6f0fa 60%, #e8f5e9 100%);
    background-attachment: fixed;
    color: #2d3436;
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, rgba(120, 200, 150, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(180, 140, 220, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(100, 180, 255, 0.08) 0%, transparent 50%);
    z-index: -1;
    animation: float 20s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(20px, -20px) rotate(1deg); }
    66% { transform: translate(-10px, 15px) rotate(-1deg); }
  }

  h1 {
    text-align: center;
    margin: 20px 0;
    font-size: 1.6em;
    font-weight: 700;
    background: linear-gradient(135deg, #4a7c59, #6bb386, #4a7c59);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .glass {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .glass-strong {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255,255,255,0.7);
  }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 16px 0; }
  .stat-card {
    padding: 16px 10px;
    text-align: center;
    transition: transform 0.2s ease;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card .label { font-size: 0.78em; color: #888; font-weight: 500; letter-spacing: 0.5px; }
  .stat-card .value {
    font-size: 1.6em;
    font-weight: 800;
    margin-top: 4px;
    background: linear-gradient(135deg, #3d8b5e, #5ab77e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-card .value.accent {
    background: linear-gradient(135deg, #e74c3c, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-card .sub { font-size: 0.72em; color: #aaa; margin-top: 3px; }

  .chart-container { padding: 20px 16px; margin: 16px 0; }

  .section-title {
    font-size: 1.05em;
    font-weight: 700;
    color: #4a7c59;
    margin: 24px 0 12px;
    letter-spacing: 0.5px;
  }

  .weekly { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 10px 0; }
  .week-card { padding: 14px; text-align: center; transition: transform 0.2s ease; }
  .week-card:hover { transform: translateY(-2px); }
  .week-card .wk { font-size: 0.78em; color: #888; }
  .week-card .wv {
    font-size: 1.3em; font-weight: 800;
    background: linear-gradient(135deg, #3d8b5e, #5ab77e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin: 4px 0;
  }

  .table-wrap { padding: 0; overflow: hidden; margin: 0 0 20px; }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: linear-gradient(135deg, rgba(74, 124, 89, 0.85), rgba(93, 156, 112, 0.85));
    backdrop-filter: blur(10px);
    color: #fff; padding: 12px 8px; font-size: 0.82em; text-align: center; font-weight: 600; letter-spacing: 0.5px;
  }
  td { padding: 10px 8px; text-align: center; font-size: 0.84em; border-bottom: 1px solid rgba(0,0,0,0.04); background: transparent; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(74, 124, 89, 0.04); }

  .weight-down { color: #27ae60; font-weight: 700; }
  .weight-up { color: #e74c3c; font-weight: 700; }
  .weight-same { color: #aaa; }
  .injection td { background: rgba(255, 215, 0, 0.08); }
  .exercise-tag {
    display: inline-block;
    background: linear-gradient(135deg, rgba(74,124,89,0.12), rgba(107,179,134,0.15));
    color: #3d7a52; padding: 3px 8px; border-radius: 8px; font-size: 0.75em; font-weight: 500;
    border: 1px solid rgba(74,124,89,0.1);
  }

  .footer { text-align: center; color: #bbb; font-size: 0.72em; margin: 24px 0; letter-spacing: 0.5px; }

  .progress-wrap { margin: 16px 0; padding: 16px 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.8em; color: #888; margin-bottom: 8px; }
  .progress-bar { height: 10px; border-radius: 10px; background: rgba(0,0,0,0.06); overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, #6bb386, #4a7c59, #3d8b5e);
    transition: width 1s ease; box-shadow: 0 2px 8px rgba(74,124,89,0.3);
  }

  /* Tabs */
  .tabs { display: flex; border-radius: 16px 16px 0 0; overflow: hidden; margin-top: 24px; margin-bottom: 0; }
  .tab { flex: 1; text-align: center; padding: 14px; font-size: 0.9em; font-weight: 600; color: #4a7c59; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.3); }
  .tab.active { background: rgba(255,255,255,0.6); color: #3d8b5e; border-bottom: 2px solid #4a7c59; }
  .tab:not(.active):hover { background: rgba(255,255,255,0.45); }
  .tab-content { margin-bottom: 20px; }

  /* Carousel */
  .carousel-wrap { position: relative; overflow: hidden; margin: 10px 0; }
  .carousel-track { display: flex; transition: transform 0.35s ease; touch-action: pan-y; }
  .carousel-card { min-width: 100%; box-sizing: border-box; padding: 16px; }
  .carousel-card .cc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .carousel-card .cc-meal { font-size: 1em; font-weight: 700; color: #4a7c59; }
  .carousel-card .cc-cal { font-size: 0.9em; font-weight: 600; color: #3d8b5e; }
  .carousel-card .cc-items { margin-bottom: 10px; }
  .carousel-card .cc-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85em; color: #2d3436; border-bottom: 1px solid rgba(74,124,89,0.06); }
  .carousel-card .cc-item:last-child { border-bottom: none; }
  .carousel-card .cc-macros { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .carousel-card .cc-macros span { background: rgba(74,124,89,0.08); padding: 3px 10px; border-radius: 8px; font-size: 0.78em; color: #4a7c59; font-weight: 500; }
  .carousel-dots { display: flex; justify-content: center; gap: 8px; padding: 12px 0; }
  .carousel-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(74,124,89,0.2); cursor: pointer; transition: all 0.2s; }
  .carousel-dots .dot.active { background: #4a7c59; transform: scale(1.3); }
  .carousel-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 50%; background: rgba(74,124,89,0.15); border: none; color: #4a7c59; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 2; }
  .carousel-nav:hover { background: rgba(74,124,89,0.3); }
  .carousel-nav.prev { left: 6px; }
  .carousel-nav.next { right: 6px; }
  .no-meals { text-align: center; padding: 30px; color: #888; font-size: 0.9em; }

  /* Diet history */
  .diet-day { margin: 8px 0; padding: 0; overflow: hidden; }
  .diet-day-header { font-size: 0.9em; font-weight: 600; color: #4a7c59; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .diet-day-header .day-cal { font-size: 0.85em; color: #3d8b5e; font-weight: 600; }
  .diet-day-header .toggle-icon { font-size: 0.8em; color: #4a7c59; transition: transform 0.2s; }
  .diet-day-header .toggle-icon.open { transform: rotate(90deg); }
  .diet-day-body { display: none; padding: 0 16px 16px; }
</style>
</head>
<body>

<h1>🌿 小涵的减重记录</h1>

<div class="stats">
  <div class="stat-card glass"><div class="label">起始体重</div><div class="value" id="startW">--</div><div class="sub" id="startDate"></div></div>
  <div class="stat-card glass"><div class="label">今日体重</div><div class="value" id="currentW">--</div><div class="sub" id="currentDate"></div></div>
  <div class="stat-card glass"><div class="label">已减</div><div class="value" id="totalLoss">--</div><div class="sub" id="totalDays"></div></div>
</div>
<div class="stats">
  <div class="stat-card glass"><div class="label">目标</div><div class="value accent" id="goalW">62.0</div><div class="sub">4月25日前</div></div>
  <div class="stat-card glass"><div class="label">距目标</div><div class="value accent" id="toGoal">--</div><div class="sub">还差</div></div>
  <div class="stat-card glass"><div class="label">周均减重</div><div class="value" id="weeklyAvg">--</div><div class="sub">kg/周</div></div>
</div>

<div class="progress-wrap glass">
  <div class="progress-label"><span id="pStart">70.0</span><span id="pPercent">0%</span><span id="pGoal">62.0</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
</div>

<div class="chart-container glass-strong">
  <canvas id="weightChart" height="200"></canvas>
</div>

<div class="section-title">🍽️ 今日饮食</div>
<div class="today-summary glass-strong" id="todaySummary" style="display:none; padding:16px; margin:10px 0;">
  <div class="stats" style="margin:0;">
    <div class="stat-card" style="padding:10px;"><div class="label">总热量</div><div class="value" id="todayCal">--</div><div class="sub"><span id="todayCalTarget"></span></div></div>
    <div class="stat-card" style="padding:10px;"><div class="label">蛋白质</div><div class="value" id="todayP">--</div><div class="sub"><span id="todayPTarget"></span></div></div>
    <div class="stat-card" style="padding:10px;"><div class="label">碳水</div><div class="value" id="todayC">--</div><div class="sub"><span id="todayCTarget"></span></div></div>
  </div>
  <div class="stats" style="margin:8px 0 0;">
    <div class="stat-card" style="padding:10px;"><div class="label">脂肪</div><div class="value" id="todayF">--</div><div class="sub"><span id="todayFTarget"></span></div></div>
    <div class="stat-card" style="padding:10px;"><div class="label">纤维</div><div class="value" id="todayFiber">--</div><div class="sub">g</div></div>
    <div class="stat-card" style="padding:10px;"><div class="label">餐次</div><div class="value" id="todayCount">--</div><div class="sub">次</div></div>
  </div>
</div>
<div class="carousel-wrap" id="todayCarousel">
  <div class="carousel-track" id="todayTrack"></div>
  <div class="carousel-dots" id="todayDots"></div>
</div>

<div class="section-title">📊 每周汇总</div>
<div class="weekly" id="weeklyCards"></div>
<div style="text-align:center;margin:8px 0 16px;">
  <button id="weeklyToggle" onclick="toggleWeekly()" style="background:none;border:1px solid rgba(74,124,89,0.25);color:#4a7c59;padding:6px 18px;border-radius:10px;font-size:0.82em;cursor:pointer;font-weight:500;transition:all 0.2s;">展开全部</button>
</div>

<div class="section-title">📅 每月汇总</div>
<div class="weekly" id="monthlyCards"></div>

<div class="tabs glass-strong">
  <div class="tab active" data-tab="weight">📋 每日明细</div>
  <div class="tab" data-tab="diet">🍽️ 每日饮食</div>
</div>

<div class="tab-content" id="tab-weight">
<div class="table-wrap glass-strong" style="margin-top:0; border-top-left-radius:0; border-top-right-radius:0;">
<table>
  <thead><tr><th>日期</th><th>星期</th><th>体重</th><th>变化</th><th>运动</th><th>备注</th></tr></thead>
  <tbody id="tableBody"></tbody>
</table>
</div>
</div>

<div class="tab-content" id="tab-diet" style="display:none;">
<div id="dietHistory"></div>
</div>

<div class="footer">姆姆医生 💚 为小涵定制</div>

<script>
// ===== 数据区 =====
const DAILY_TARGET = { cal: 1200, protein: 70, carbs: 125, fat: 40 };
function f(n) { return Number(n).toFixed(1); }

// 饮食记录 - 每次小涵报告吃了什么就在这里添加
const MEALS = [
  { date: '2026-04-09', meal: '午餐', items: '酸菜鱼（鱼肉200g）', cal: 250, protein: 36, carbs: 2, fat: 10, fiber: 0 },
  { date: '2026-04-09', meal: '午餐', items: '酸菜+汤底', cal: 150, protein: 2, carbs: 5, fat: 13, fiber: 1 },
  { date: '2026-04-09', meal: '午餐', items: '杂粮饭一小坨 ~100g', cal: 120, protein: 3, carbs: 25, fat: 1, fiber: 2 },
  { date: '2026-04-09', meal: '晚餐', items: '鸭腿 ~80g', cal: 180, protein: 16, carbs: 0, fat: 13, fiber: 0 },
  { date: '2026-04-09', meal: '晚餐', items: '肉丸子 1个', cal: 120, protein: 8, carbs: 5, fat: 7, fiber: 0 },
  { date: '2026-04-09', meal: '晚餐', items: '糖醋沙巴鱼 ~80g', cal: 150, protein: 10, carbs: 12, fat: 7, fiber: 0 },
  { date: '2026-04-09', meal: '晚餐', items: '炒豆芽青菜', cal: 45, protein: 3, carbs: 5, fat: 2, fiber: 2 },
  { date: '2026-04-09', meal: '晚餐', items: '醋溜白菜', cal: 40, protein: 1, carbs: 6, fat: 2, fiber: 1.5 },
  { date: '2026-04-09', meal: '加餐', items: '蛋白粉 半杯', cal: 60, protein: 12, carbs: 1.5, fat: 0.5, fiber: 0 },
  { date: '2026-04-09', meal: '加餐', items: '牛肉干 15g', cal: 56, protein: 9.8, carbs: 1, fat: 1.6, fiber: 0 },
  { date: '2026-04-13', meal: '午餐', items: '福鼎肉片（大份）', cal: 420, protein: 35, carbs: 22, fat: 18, fiber: 1 },
  { date: '2026-04-13', meal: '午餐', items: '腐乳空心菜', cal: 80, protein: 3, carbs: 5, fat: 5, fiber: 2 },
];

const DATA = [
  { date: '2026-03-12', weight: 70.0, exercise: '游泳 1000m', note: '起始' },
  { date: '2026-03-13', weight: null, exercise: '步行 18000步', note: '体检日' },
  { date: '2026-03-14', weight: 69.4, exercise: '', note: '' },
  { date: '2026-03-15', weight: 68.2, exercise: '', note: '' },
  { date: '2026-03-16', weight: null, exercise: '', note: '' },
  { date: '2026-03-17', weight: null, exercise: '', note: '腹部B超' },
  { date: '2026-03-18', weight: null, exercise: '骑车 28km', note: '内分泌复查' },
  { date: '2026-03-19', weight: 68.1, exercise: '拳击 50min', note: '' },
  { date: '2026-03-20', weight: 68.5, exercise: '', note: '💉 第1针' },
  { date: '2026-03-21', weight: 68.1, exercise: '', note: '' },
  { date: '2026-03-22', weight: 67.8, exercise: '骑车 49km', note: '' },
  { date: '2026-03-23', weight: 67.5, exercise: '毛毛虫4组', note: '' },
  { date: '2026-03-24', weight: 67.3, exercise: '拳击 1h', note: '' },
  { date: '2026-03-25', weight: 66.7, exercise: '骑车 28km', note: '' },
  { date: '2026-03-26', weight: 66.4, exercise: '骑车 28km', note: '' },
  { date: '2026-03-27', weight: 66.6, exercise: '', note: '💉 第2针' },
  { date: '2026-03-28', weight: null, exercise: '爬长城 5h', note: '' },
  { date: '2026-03-29', weight: 66.1, exercise: '', note: '' },
  { date: '2026-03-30', weight: 66.1, exercise: '', note: '' },
  { date: '2026-03-31', weight: 65.8, exercise: '', note: '' },
  { date: '2026-04-01', weight: 65.8, exercise: '骑车 28km', note: '' },
  { date: '2026-04-02', weight: 65.8, exercise: 'Body Combat', note: '' },
  { date: '2026-04-03', weight: 66.1, exercise: '', note: '💉 第3针' },
  { date: '2026-04-04', weight: 65.3, exercise: '', note: '' },
  { date: '2026-04-05', weight: null, exercise: '', note: '' },
  { date: '2026-04-06', weight: 65.2, exercise: '', note: '' },
  { date: '2026-04-07', weight: 65.0, exercise: '拳击课', note: '' },
  { date: '2026-04-08', weight: null, exercise: '骑车 28km', note: '' },
  { date: '2026-04-09', weight: 65.0, exercise: '', note: '' },
  { date: '2026-04-10', weight: 65.0, exercise: '', note: '💉 第4针 ~4mg' },
  { date: '2026-04-11', weight: null, exercise: '', note: '' },
  { date: '2026-04-12', weight: null, exercise: '', note: '' },
  { date: '2026-04-13', weight: 64.4, exercise: '', note: '' },
  { date: '2026-04-14', weight: 63.5, exercise: '', note: '' },
];

const GOAL = 62.0;
const ULTIMATE_GOAL = 50.0;

// ===== 渲染逻辑 =====
const DAYS = ['日','一','二','三','四','五','六'];
function dayOfWeek(d) { return DAYS[new Date(d).getDay()]; }
function fmt(d) { return d.slice(5).replace('-','/'); }
function diffDays(a, b) { return Math.round((new Date(b)-new Date(a))/86400000); }

const withWeight = DATA.filter(d => d.weight !== null);
const first = withWeight[0];
const last = withWeight[withWeight.length - 1];
const days = diffDays(first.date, last.date);
const loss = first.weight - last.weight;
const weeks = days / 7 || 1;

document.getElementById('startW').textContent = first.weight.toFixed(1);
document.getElementById('startDate').textContent = fmt(first.date);
document.getElementById('currentW').textContent = last.weight.toFixed(1);
document.getElementById('currentDate').textContent = fmt(last.date);
document.getElementById('totalLoss').textContent = '-' + loss.toFixed(1) + 'kg';
document.getElementById('totalDays').textContent = days + '天';
document.getElementById('toGoal').textContent = (last.weight - GOAL).toFixed(1) + 'kg';
document.getElementById('weeklyAvg').textContent = (loss / weeks).toFixed(2);

const totalToLose = first.weight - GOAL;
const pct = Math.min(100, (loss / totalToLose * 100)).toFixed(0);
document.getElementById('pStart').textContent = first.weight.toFixed(1);
document.getElementById('pGoal').textContent = GOAL.toFixed(1);
document.getElementById('pPercent').textContent = pct + '%';
setTimeout(() => { document.getElementById('progressFill').style.width = pct + '%'; }, 100);

// Chart
const chartLabels = withWeight.map(d => fmt(d.date));
const chartData = withWeight.map(d => d.weight);
const gradient = document.getElementById('weightChart').getContext('2d');
const gFill = gradient.createLinearGradient(0, 0, 0, 300);
gFill.addColorStop(0, 'rgba(74, 124, 89, 0.25)');
gFill.addColorStop(1, 'rgba(74, 124, 89, 0.02)');

new Chart(document.getElementById('weightChart'), {
  type: 'line',
  data: {
    labels: chartLabels,
    datasets: [
      {
        label: '体重 (kg)', data: chartData,
        borderColor: '#4a7c59', backgroundColor: gFill, fill: true, tension: 0.4, borderWidth: 2.5,
        pointBackgroundColor: withWeight.map(d => d.note && d.note.includes('💉') ? '#e74c3c' : '#fff'),
        pointBorderColor: withWeight.map(d => d.note && d.note.includes('💉') ? '#e74c3c' : '#4a7c59'),
        pointBorderWidth: 2,
        pointRadius: withWeight.map(d => d.note && d.note.includes('💉') ? 7 : 4),
        pointHoverRadius: 8,
      },
      {
        label: '目标 ' + GOAL + 'kg',
        data: Array(chartLabels.length).fill(GOAL),
        borderColor: 'rgba(231, 76, 60, 0.4)', borderDash: [6, 4], borderWidth: 1.5, pointRadius: 0, fill: false,
      },
      {
        label: '终极目标 ' + ULTIMATE_GOAL + 'kg',
        data: Array(chartLabels.length).fill(ULTIMATE_GOAL),
        borderColor: 'rgba(155, 89, 182, 0.35)', borderDash: [3, 3], borderWidth: 1, pointRadius: 0, fill: false,
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: true, position: 'top', labels: { font: { size: 11 }, usePointStyle: true, padding: 16 } },
      tooltip: {
        backgroundColor: 'rgba(255,255,255,0.9)', titleColor: '#333', bodyColor: '#555',
        borderColor: 'rgba(0,0,0,0.1)', borderWidth: 1, cornerRadius: 10, padding: 12,
        callbacks: {
          afterLabel: function(ctx) {
            if (ctx.datasetIndex === 0) {
              const d = withWeight[ctx.dataIndex];
              let s = '';
              if (d.exercise) s += '🏃 ' + d.exercise;
              if (d.note) s += (s ? '\n' : '') + d.note;
              return s;
            }
          }
        }
      }
    },
    scales: {
      y: { min: Math.floor(GOAL - 1), max: Math.ceil(first.weight + 0.5), ticks: { callback: v => v + 'kg', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.04)' } },
      x: { ticks: { font: { size: 10 }, maxRotation: 45 }, grid: { display: false } }
    }
  }
});

// Weekly cards
// 按打针周期算周：周五到周四
function getWeekNum(dateStr) {
  const d = new Date(dateStr);
  // 调整：周五=0, 周六=1, ..., 周四=6
  const day = (d.getDay() + 2) % 7;
  const first = new Date(DATA[0].date);
  const firstDay = (first.getDay() + 2) % 7;
  const firstFri = new Date(first);
  firstFri.setDate(first.getDate() - firstDay);
  return Math.floor((d - firstFri) / (7 * 86400000));
}
const weekMap = {};
withWeight.forEach(d => { const wk = getWeekNum(d.date); if (!weekMap[wk]) weekMap[wk] = []; weekMap[wk].push(d); });
const weeklyEl = document.getElementById('weeklyCards');
const weekKeys = Object.keys(weekMap).sort((a,b) => b-a);
const SHOW_RECENT = 4;
let weeklyExpanded = false;

// 检查某周是否有打针
const injectionWeeks = {};
DATA.forEach(d => {
  if (d.note && d.note.includes('💉')) injectionWeeks[getWeekNum(d.date)] = d.note;
});

weekKeys.forEach((wk, i) => {
  const entries = weekMap[wk];
  const wStart = entries[0].weight, wEnd = entries[entries.length-1].weight, wLoss = wStart - wEnd;
  const card = document.createElement('div');
  card.className = 'week-card glass';
  if (weekKeys.length > SHOW_RECENT && i >= SHOW_RECENT) card.style.display = 'none';
  card.dataset.weekIdx = i;
  const needle = injectionWeeks[wk] ? ' 🪡' : '';
  card.innerHTML = `<div class="wk">第${parseInt(wk)+1}周${needle}</div><div class="wv">${wLoss >= 0 ? '-' : '+'}${Math.abs(wLoss).toFixed(1)}kg</div><div class="wk">${wStart.toFixed(1)} → ${wEnd.toFixed(1)}</div>`;
  weeklyEl.appendChild(card);
});

const weeklyToggleBtn = document.getElementById('weeklyToggle');
if (weekKeys.length <= SHOW_RECENT) weeklyToggleBtn.style.display = 'none';

function toggleWeekly() {
  weeklyExpanded = !weeklyExpanded;
  weeklyEl.querySelectorAll('.week-card').forEach((card, i) => {
    if (i >= SHOW_RECENT) card.style.display = weeklyExpanded ? '' : 'none';
  });
  weeklyToggleBtn.textContent = weeklyExpanded ? '收起' : '展开全部';
}

// Monthly cards
const monthMap = {};
withWeight.forEach(d => {
  const month = d.date.slice(0, 7); // YYYY-MM
  if (!monthMap[month]) monthMap[month] = [];
  monthMap[month].push(d);
});
const monthlyEl = document.getElementById('monthlyCards');
const monthNames = { '01':'一月','02':'二月','03':'三月','04':'四月','05':'五月','06':'六月','07':'七月','08':'八月','09':'九月','10':'十月','11':'十一月','12':'十二月' };
Object.keys(monthMap).sort().reverse().forEach(month => {
  const entries = monthMap[month];
  const mStart = entries[0].weight, mEnd = entries[entries.length-1].weight;
  const mLoss = mStart - mEnd;
  const mMin = Math.min(...entries.map(e => e.weight));
  const mMax = Math.max(...entries.map(e => e.weight));
  const card = document.createElement('div');
  card.className = 'week-card glass';
  const mm = month.split('-')[1];
  card.innerHTML = `<div class="wk">${monthNames[mm] || mm}</div><div class="wk" style="font-size:0.7em;color:#aaa;">${fmt(entries[0].date)} - ${fmt(entries[entries.length-1].date)}</div><div class="wv">${mLoss >= 0 ? '-' : '+'}${Math.abs(mLoss).toFixed(1)}kg</div><div class="wk">${mStart.toFixed(1)} → ${mEnd.toFixed(1)}</div><div class="wk" style="margin-top:2px;font-size:0.72em;color:#aaa;">最低 ${mMin.toFixed(1)} / 最高 ${mMax.toFixed(1)}</div>`;
  monthlyEl.appendChild(card);
});

// Table
const tbody = document.getElementById('tableBody');
let prevWeight = null;
DATA.forEach(d => {
  const tr = document.createElement('tr');
  if (d.note && d.note.includes('💉')) tr.className = 'injection';
  let changeHtml = '<span class="weight-same">-</span>';
  if (d.weight !== null) {
    if (prevWeight !== null) {
      const diff = d.weight - prevWeight;
      if (diff < 0) changeHtml = `<span class="weight-down">${diff.toFixed(1)}</span>`;
      else if (diff > 0) changeHtml = `<span class="weight-up">+${diff.toFixed(1)}</span>`;
      else changeHtml = `<span class="weight-same">0</span>`;
    }
    prevWeight = d.weight;
  }
  const exerciseHtml = d.exercise ? `<span class="exercise-tag">${d.exercise}</span>` : '';
  tr.innerHTML = `<td>${fmt(d.date)}</td><td>${dayOfWeek(d.date)}</td><td style="font-weight:600">${d.weight !== null ? d.weight.toFixed(1) : '-'}</td><td>${changeHtml}</td><td>${exerciseHtml}</td><td>${d.note || ''}</td>`;
  tbody.appendChild(tr);
});

// ===== 饮食模块 =====
function groupMeals(meals) {
  const map = {};
  meals.forEach(m => {
    const key = m.meal;
    if (!map[key]) map[key] = { meal: m.meal, items: [], cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
    map[key].items.push({ name: m.items, cal: m.cal });
    map[key].cal += m.cal || 0;
    map[key].protein += m.protein || 0;
    map[key].carbs += m.carbs || 0;
    map[key].fat += m.fat || 0;
    map[key].fiber += m.fiber || 0;
  });
  return Object.values(map);
}

function buildCarousel(wrapEl, trackEl, dotsEl, grouped) {
  let idx = 0;
  grouped.forEach(g => {
    const card = document.createElement('div');
    card.className = 'carousel-card glass';
    const itemsHtml = g.items.map(i => `<div class="cc-item"><span>${i.name}</span><span>${f(i.cal)} kcal</span></div>`).join('');
    card.innerHTML = `
      <div class="cc-header"><span class="cc-meal">${g.meal}</span><span class="cc-cal">${f(g.cal)} kcal</span></div>
      <div class="cc-items">${itemsHtml}</div>
      <div class="cc-macros">
        <span>蛋白质 ${f(g.protein)}g</span><span>碳水 ${f(g.carbs)}g</span><span>脂肪 ${f(g.fat)}g</span>
        ${g.fiber ? `<span>纤维 ${f(g.fiber)}g</span>` : ''}
      </div>`;
    trackEl.appendChild(card);
  });
  grouped.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  });
  if (grouped.length > 1) {
    const prev = document.createElement('button'); prev.className = 'carousel-nav prev'; prev.innerHTML = '‹'; prev.onclick = () => goTo(Math.max(0, idx - 1));
    const next = document.createElement('button'); next.className = 'carousel-nav next'; next.innerHTML = '›'; next.onclick = () => goTo(Math.min(grouped.length - 1, idx + 1));
    wrapEl.appendChild(prev); wrapEl.appendChild(next);
  }
  function goTo(i) {
    idx = i;
    trackEl.style.transform = `translateX(-${i * 100}%)`;
    dotsEl.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === i));
  }
  let startX = 0;
  trackEl.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
  trackEl.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(Math.max(0, Math.min(grouped.length - 1, idx + (diff > 0 ? 1 : -1))));
  });
}

// Today's meals
const today = new Date().toISOString().slice(0, 10);
const todayMeals = MEALS.filter(m => m.date === today);
const todayTrack = document.getElementById('todayTrack');
const todayDots = document.getElementById('todayDots');
const todayCarousel = document.getElementById('todayCarousel');

if (todayMeals.length === 0) {
  todayCarousel.innerHTML = '<div class="no-meals glass">今天还没有饮食记录 🍽️</div>';
} else {
  const grouped = groupMeals(todayMeals);
  buildCarousel(todayCarousel, todayTrack, todayDots, grouped);
  document.getElementById('todaySummary').style.display = 'block';
  let tCal = 0, tP = 0, tC = 0, tF = 0, tFiber = 0;
  todayMeals.forEach(m => { tCal += m.cal||0; tP += m.protein||0; tC += m.carbs||0; tF += m.fat||0; tFiber += m.fiber||0; });
  document.getElementById('todayCal').textContent = f(tCal);
  document.getElementById('todayCalTarget').textContent = `/ ${DAILY_TARGET.cal} kcal`;
  document.getElementById('todayP').textContent = f(tP);
  document.getElementById('todayPTarget').textContent = `/ ${DAILY_TARGET.protein}g`;
  document.getElementById('todayC').textContent = f(tC);
  document.getElementById('todayCTarget').textContent = `/ ${DAILY_TARGET.carbs}g`;
  document.getElementById('todayF').textContent = f(tF);
  document.getElementById('todayFTarget').textContent = `/ ${DAILY_TARGET.fat}g`;
  document.getElementById('todayFiber').textContent = f(tFiber);
  document.getElementById('todayCount').textContent = grouped.length;
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
  });
});

// Diet history
const dietEl = document.getElementById('dietHistory');
if (MEALS.length === 0) {
  dietEl.innerHTML = '<div class="no-meals glass" style="margin:10px 0;">还没有饮食记录 🍽️<br><span style="font-size:0.8em;color:#aaa;">告诉姆姆你吃了什么就会出现在这里</span></div>';
} else {
  const dayMap = {};
  MEALS.forEach(m => { if (!dayMap[m.date]) dayMap[m.date] = []; dayMap[m.date].push(m); });
  Object.keys(dayMap).sort().reverse().forEach(date => {
    const meals = dayMap[date];
    const dayCal = meals.reduce((s, m) => s + (m.cal || 0), 0);
    const grouped = groupMeals(meals);
    const section = document.createElement('div');
    section.className = 'diet-day glass';
    section.innerHTML = `
      <div class="diet-day-header">
        <span>${fmt(date)} 星期${dayOfWeek(date)}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="day-cal">${f(dayCal)} kcal</span>
          <span class="toggle-icon">›</span>
        </span>
      </div>
      <div class="diet-day-body">
        <div class="carousel-wrap"><div class="carousel-track"></div><div class="carousel-dots"></div></div>
      </div>`;
    const header = section.querySelector('.diet-day-header');
    const body = section.querySelector('.diet-day-body');
    const icon = section.querySelector('.toggle-icon');
    header.addEventListener('click', () => {
      const open = body.style.display === 'block';
      body.style.display = open ? 'none' : 'block';
      icon.classList.toggle('open', !open);
      if (!body.dataset.init) {
        const cWrap = body.querySelector('.carousel-wrap');
        buildCarousel(cWrap, cWrap.querySelector('.carousel-track'), cWrap.querySelector('.carousel-dots'), grouped);
        body.dataset.init = '1';
      }
    });
    dietEl.appendChild(section);
  });
}
</script>
